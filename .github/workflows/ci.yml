# .github/workflows/ci.yml
# Binti2 CI/CD Pipeline
# 
# This workflow handles:
# - Project validation (manifest, strings, source files)
# - Build and test automation
# - Release APK generation and distribution
# - Model asset packaging for Google Drive distribution
#
# Models are hosted on Google Drive with local USB/SD card fallback.
# The app uses Vosk grammar-based wake word detection (no separate model needed).

name: Binti2 CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  release:
    types: [created]

# Set environment variable to use Node.js 24 for all actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Validate Gradle wrapper JAR exists
        run: |
          echo "🔍 Checking Gradle wrapper integrity..."
          
          # Check gradlew script exists
          if [ ! -f "gradlew" ]; then
            echo "❌ gradlew script not found"
            echo "💡 Run 'gradle wrapper' locally and commit the files"
            exit 1
          fi
          
          # Check gradle-wrapper.jar exists
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "❌ gradle-wrapper.jar not found"
            echo "💡 The JAR file is required for reproducible builds"
            echo "💡 Run 'gradle wrapper' locally and commit all wrapper files"
            exit 1
          fi
          
          # Check gradle-wrapper.properties exists
          if [ ! -f "gradle/wrapper/gradle-wrapper.properties" ]; then
            echo "❌ gradle-wrapper.properties not found"
            exit 1
          fi
          
          echo "✅ Gradle wrapper files verified"

      - name: Grant execute permission for gradlew
        run: |
          chmod +x gradlew
          echo "✅ gradlew permissions set"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Check for missing source files
        run: |
          echo "🔍 Checking critical source files..."
          
          missing_files=()
          
          # Check essential project files
          essential_files=(
            "app/build.gradle.kts"
            "build.gradle.kts"
            "settings.gradle.kts"
            "app/src/main/AndroidManifest.xml"
          )
          
          for file in "${essential_files[@]}"; do
            if [ ! -f "$file" ]; then
              missing_files+=("$file")
            fi
          done
          
          # Check for Kotlin source directory
          if [ ! -d "app/src/main/java" ] && [ ! -d "app/src/main/kotlin" ]; then
            missing_files+=("app/src/main/{java|kotlin} (source directory)")
          fi
          
          # Check for resources directory
          if [ ! -d "app/src/main/res" ]; then
            missing_files+=("app/src/main/res (resources directory)")
          fi
          
          if [ ${#missing_files[@]} -gt 0 ]; then
            echo "❌ Missing critical files:"
            for f in "${missing_files[@]}"; do
              echo "   - $f"
            done
            exit 1
          fi
          
          echo "✅ All critical source files present"

      - name: Verify Model Sizes (<1GB total)
        run: |
          if [ -d "app/src/main/assets/models" ]; then
            echo "📦 Checking model sizes..."
            total_size=$(find app/src/main/assets/models -type f -exec stat -c%s {} + 2>/dev/null | awk '{sum+=$1} END {print sum/1024/1024}')
            
            if [ -z "$total_size" ] || [ "$total_size" = "0" ]; then
              echo "⚠️ No model files found in assets directory"
              echo "✅ Skipping model size check (models will be downloaded from Google Drive at runtime)"
              exit 0
            fi
            
            echo "Total model size: ${total_size}MB"
            
            # Check if bc is available, otherwise use awk
            if command -v bc &> /dev/null; then
              exceeds_limit=$(echo "$total_size > 1024" | bc -l)
            else
              exceeds_limit=$(awk "BEGIN {print ($total_size > 1024) ? 1 : 0}")
            fi
            
            if [ "$exceeds_limit" = "1" ]; then
              echo "❌ Models exceed 1GB limit! (${total_size}MB)"
              echo "💡 Large models should be hosted on Google Drive"
              exit 1
            else
              echo "✅ Model sizes OK (${total_size}MB < 1GB limit)"
            fi
          else
            echo "⚠️ No models directory found"
            echo "✅ Models will be downloaded from Google Drive at runtime"
          fi

      - name: Check Egyptian Arabic Strings
        run: |
          if [ -f "app/src/main/res/values-ar/strings.xml" ]; then
            echo "✅ Egyptian Arabic strings file exists"
            
            # Check for critical strings
            critical_strings=("app_name" "wake_word" "accessibility_service_description")
            missing_strings=()
            
            for str in "${critical_strings[@]}"; do
              if ! grep -q "name=\"$str\"" app/src/main/res/values-ar/strings.xml; then
                missing_strings+=("$str")
              fi
            done
            
            if [ ${#missing_strings[@]} -gt 0 ]; then
              echo "❌ Missing critical strings: ${missing_strings[*]}"
              exit 1
            else
              echo "✅ All critical strings found"
            fi
            
            # Count total strings
            ar_count=$(grep -c '<string' app/src/main/res/values-ar/strings.xml || echo "0")
            echo "📊 Total Egyptian Arabic strings: $ar_count"
          else
            echo "❌ Missing values-ar/strings.xml"
            exit 1
          fi

      - name: Verify AndroidManifest Security
        run: |
          if [ -f "app/src/main/AndroidManifest.xml" ]; then
            if grep -q 'usesCleartextTraffic="false"' app/src/main/AndroidManifest.xml; then
              echo "✅ HTTPS-only traffic enforced"
            else
              echo "⚠️ Cleartext traffic not explicitly disabled"
            fi
            
            if grep -q 'networkSecurityConfig' app/src/main/AndroidManifest.xml; then
              echo "✅ Network security config present"
            else
              echo "⚠️ No network security config found"
            fi
          else
            echo "❌ AndroidManifest.xml not found"
            exit 1
          fi

  build:
    name: Build & Test
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }}
          gradle-home-cache-cleanup: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --build-cache

      - name: Run unit tests
        run: ./gradlew test --no-daemon --build-cache
        continue-on-error: true

      - name: Run lint
        run: ./gradlew lint --no-daemon --build-cache
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
          if-no-files-found: error

  release:
    name: Build Release APK
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode Keystore
        env:
          ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ENCODED_KEYSTORE" ]; then
            echo "🔐 Decoding release keystore..."
            echo "$ENCODED_KEYSTORE" | base64 -d > app/release-keystore.jks
            echo "✅ Keystore decoded successfully"
          else
            echo "⚠️ No keystore secret found - will use debug signing"
            echo "💡 Add KEYSTORE_BASE64 secret for release signing"
          fi

      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -f "app/release-keystore.jks" ]; then
            echo "🔨 Building release APK with signing..."
            ./gradlew assembleRelease --no-daemon --build-cache
          else
            echo "⚠️ Building release APK with debug signing..."
            ./gradlew assembleRelease --no-daemon --build-cache
          fi

      - name: Verify Release APK
        run: |
          if ls app/build/outputs/apk/release/*.apk 1> /dev/null 2>&1; then
            echo "✅ Release APK built successfully"
            ls -la app/build/outputs/apk/release/*.apk
          else
            echo "❌ Release APK not found"
            exit 1
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v5
        with:
          name: app-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  model-pack:
    name: Package Model Assets
    needs: release
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create model manifest
        run: |
          mkdir -p models_release
          
          # Extract version from tag
          VERSION="${{ github.event.release.tag_name }}"
          echo "📦 Creating manifest for version: $VERSION"
          
          # Model manifest for Vosk MGB2 Arabic ASR
          # Note: Wake word detection uses Vosk grammar-based approach (no separate model)
          # The MGB2 model handles both ASR and wake word via grammar rules
          cat > models_release/manifest.json << EOF
{
  "version": "$VERSION",
  "models": [
    {
      "name": "Arabic ASR + Wake Word (Vosk MGB2 v0.4)",
      "file": "vosk-model-ar-mgb2-0.4.zip",
      "size_mb": 1247,
      "google_drive_id": "1bK1-pUCH5xykvKdB7nB7mZ_1wBKH05qZ"
    }
  ],
  "total_size_mb": 1247,
  "min_android_sdk": 26,
  "target_android_sdk": 34,
  "hosting": {
    "provider": "Google Drive",
    "fallback": "Local USB/SD Card"
  }
}
EOF
          
          echo "✅ Manifest created:"
          cat models_release/manifest.json

      - name: Upload model manifest
        uses: softprops/action-gh-release@v2
        with:
          files: models_release/manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
